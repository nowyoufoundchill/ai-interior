name: Supabase DB Check

on:
  pull_request:
    branches:
      - main
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-db-*.yml"
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secret
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL is not configured."
            exit 1
          fi

      - name: Preview pending migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL" --dry-run --include-all --yes
